name: Run Restore Test
description: Execute and verify restore operation

inputs:
  timeout-seconds:
    required: false
    default: "20"
    description: Timeout for restore completion

runs:
  using: composite
  steps:
    - name: Get latest snapshot
      id: get-snapshot
      shell: bash
      run: |
        SNAP_TIME=$(docker exec pbs-plus-test ls /mnt/test/ns/test/host/test-host/ | grep -E '^[0-9]{4}-[0-9]{2}-[0-9]{2}T' | sort | tail -1)

        if [ -z "$SNAP_TIME" ]; then
          echo "✗ No snapshot found in /mnt/test/ns/test/host/test-host/"
          exit 1
        fi

        SNAP_TS=$(docker exec pbs-plus-test date -d "${SNAP_TIME}" +%s)
        SNAPSHOT="host/test-host/${SNAP_TS}"

        echo "snapshot=${SNAPSHOT}" >> "$GITHUB_OUTPUT"
        echo "✓ Found snapshot: ${SNAPSHOT}"

    - name: Create restore job
      shell: bash
      run: |
        docker exec pbs-plus-test curl -k -X POST "https://localhost:8017/api2/extjs/config/disk-restore" \
          -H "Content-Type: application/x-www-form-urlencoded" \
          -d "id=test-restore" \
          -d "store=test" \
          -d "ns=test" \
          -d "snapshot=${{ steps.get-snapshot.outputs.snapshot }}" \
          -d "src-path=/" \
          -d "dest-target=test-host - /test-backup" \
          -d "dest-subpath=/tmp/pbs-plus-restore-test" \
          -d "mode=0" \
          -d "retry=0" \
          -d "retry-interval=1"

    - name: Start restore
      shell: bash
      run: |
        docker exec pbs-plus-test curl -k -X POST "https://localhost:8017/api2/extjs/d2d/restore?job=dGVzdC1yZXN0b3Jl" \
          -H "Content-Type: application/x-www-form-urlencoded"

    - name: Wait for restore completion
      shell: bash
      run: |
        echo "Waiting for restore to complete..."
        timeout=$(( ${{ inputs.timeout-seconds }} * 6 ))
        elapsed=0

        while [ $elapsed -lt $timeout ]; do
          if docker logs pbs-plus-agent 2>&1 | grep -q "restore: finished"; then
            echo "✓ PBS Agent restore process finished"
            # Give logs time to flush before verifying success
            sleep 0.5
            break
          fi
          sleep 1
          elapsed=$((elapsed + 1))
          echo "Still waiting... (${elapsed}s)"
        done

        if [ $elapsed -ge $timeout ]; then
          echo "✗ Timeout reached after ${timeout}s"
          exit 1
        fi

    - name: Verify restore success
      shell: bash
      run: |
        # Retry loop to account for Docker log buffering
        success=false
        for i in {1..5}; do
          if docker logs pbs-plus-agent 2>&1 | grep -q "restore: completed successfully"; then
            success=true
            break
          fi
          echo "Waiting for success log to appear... (attempt $i/5)"
          sleep 0.5
        done

        if [ "$success" != "true" ]; then
          echo "✗ Restore did not complete successfully"
          exit 1
        fi
        echo "✓ Restore completed successfully"

        RESTORED=$(docker exec pbs-plus-agent find /test-backup/tmp/pbs-plus-restore-test -type f 2>/dev/null | wc -l)
        if [ "$RESTORED" -eq 0 ]; then
          echo "✗ No files found in restore destination"
          exit 1
        fi
        echo "✓ ${RESTORED} file(s) restored to /test-backup/tmp/pbs-plus-restore-test"

    - name: Verify data integrity
      shell: bash
      run: |
        echo "Computing checksums of source files..."
        docker exec pbs-plus-agent sh -c 'cd /test-backup && find . -type f -exec sha256sum {} \; | sort' > /tmp/source-checksums.txt

        echo "Computing checksums of restored files..."
        docker exec pbs-plus-agent sh -c 'cd /test-backup/tmp/pbs-plus-restore-test && find . -type f -exec sha256sum {} \; | sort' > /tmp/restored-checksums.txt

        # Normalize paths for comparison (strip leading ./)
        sed -i 's|^\./||' /tmp/source-checksums.txt
        sed -i 's|^\./||' /tmp/restored-checksums.txt

        if ! diff -q /tmp/source-checksums.txt /tmp/restored-checksums.txt > /dev/null 2>&1; then
          echo "✗ DATA INTEGRITY CHECK FAILED: restored files differ from source!"
          echo ""
          echo "=== Differences (source vs restored) ==="
          diff /tmp/source-checksums.txt /tmp/restored-checksums.txt || true
          echo ""
          echo "=== Source file sizes ==="
          docker exec pbs-plus-agent sh -c 'cd /test-backup && find . -type f -exec stat -c "%s %n" {} \; | sort'
          echo ""
          echo "=== Restored file sizes ==="
          docker exec pbs-plus-agent sh -c 'cd /test-backup/tmp/pbs-plus-restore-test && find . -type f -exec stat -c "%s %n" {} \; | sort'
          exit 1
        fi

        SOURCE_COUNT=$(wc -l < /tmp/source-checksums.txt)
        RESTORED_COUNT=$(wc -l < /tmp/restored-checksums.txt)
        echo "✓ Data integrity verified: ${RESTORED_COUNT}/${SOURCE_COUNT} files match (sha256)"

    - name: Verify restore task status
      shell: bash
      run: |
        RESTORE_ID_ENCODED=$(echo -n "test-restore" | base64 -w0)
        echo "Checking restore task status..."
        # Poll for task completion -- the task closes asynchronously
        # after the restore process finishes.
        for i in $(seq 1 30); do
          TASK_STATUS=$(docker exec pbs-plus-test curl -k -s "https://localhost:8017/api2/extjs/config/disk-restore/${RESTORE_ID_ENCODED}" \
            -H "Accept: application/json" | jq -r '.data.history."last-run-state"')
          echo "  Task status: ${TASK_STATUS} (attempt $i/30)"
          if [ "$TASK_STATUS" = "OK" ]; then
            echo "✓ Restore task completed with status OK"
            exit 0
          fi
          if [ -n "$TASK_STATUS" ] && [ "$TASK_STATUS" != "null" ] && [ "$TASK_STATUS" != "OK" ]; then
            echo "✗ Restore task failed with status: ${TASK_STATUS}"
            exit 1
          fi
          sleep 1
        done
        echo "✗ Restore task did not reach OK status within 30 seconds"
        exit 1
