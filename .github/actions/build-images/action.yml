name: Build Docker Images
description: Build PBS Plus server and agent images with layer caching

runs:
  using: composite
  steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build test PBS Plus server
      uses: docker/build-push-action@v6
      with:
        file: ./build/tests/Dockerfile
        tags: pbs-plus:test
        load: true
        cache-from: type=gha,scope=pbs-server
        cache-to: type=gha,scope=pbs-server,mode=max

    - name: Build containerized agent
      uses: docker/build-push-action@v6
      with:
        file: Dockerfile
        tags: pbs-plus-agent:test
        load: true
        cache-from: type=gha,scope=pbs-agent
        cache-to: type=gha,scope=pbs-agent,mode=max
        build-args: |
          VERSION=ci

    - name: Make test datastore
      shell: bash
      run: mkdir -p test
