name: Release

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  # ─── Phase 1: goreleaser builds all non-server artifacts (agents, tools) ───
  # The server is deliberately NOT built here — it must be built AFTER all
  # artifacts (including the MSI) exist so their checksums can be embedded.
  goreleaser:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.26"

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          echo "GPG_FINGERPRINT=${{ secrets.GPG_FINGERPRINT }}" >> $GITHUB_ENV

      - name: Set environment variables
        run: |
          echo "GITHUB_REPOSITORY_OWNER=${{ github.repository_owner }}" >> $GITHUB_ENV
          echo "GITHUB_REPOSITORY_NAME=${{ github.event.repository.name }}" >> $GITHUB_ENV
          echo "GITHUB_REPOSITORY=${{ github.repository }}" >> $GITHUB_ENV

      - name: Fetch tags (prune stale refs from force pushes)
        run: git fetch --tags --prune --force

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Write ECDSA signing key
        env:
          ECDSA_PRIVATE_KEY_B64: ${{ secrets.ECDSA_PRIVATE_KEY_B64 }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          if [ -z "${ECDSA_PRIVATE_KEY_B64+x}" ] || [ -z "$ECDSA_PRIVATE_KEY_B64" ]; then
            echo "ECDSA_PRIVATE_KEY_B64 secret is not set"; exit 1;
          fi
          echo "$ECDSA_PRIVATE_KEY_B64" | base64 -d > /tmp/cosign.key
          chmod 600 /tmp/cosign.key

      - name: Derive ECDSA public key
        env:
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          PUB_B64=$(cosign public-key --key /tmp/cosign.key | base64 -w0)
          if [ -z "$PUB_B64" ]; then
            echo "Failed to derive ECDSA public key"; exit 1;
          fi
          echo "ECDSA_PUBLIC_KEY_B64=$PUB_B64" >> "$GITHUB_ENV"

      - name: Build Ed25519 signer
        run: |
          mkdir -p /tmp/bin
          go build -ldflags="-s -w" -o /tmp/bin/signer ./cmd/signer
          ls -l /tmp/bin

      - name: Check seed presence
        env:
          ED25519_SEED_B64: ${{ secrets.ED25519_SEED_B64 }}
        run: |
          if [ -z "${ED25519_SEED_B64+x}" ] || [ -z "$ED25519_SEED_B64" ]; then
            echo "ED25519_SEED_B64 secret is not set"; exit 1; 
          fi

      - name: Derive Ed25519 public key
        env:
          ED25519_SEED_B64: ${{ secrets.ED25519_SEED_B64 }}
        run: |
          PUB=$("/tmp/bin/signer" ed25519-pubkey)
          if [ -z "$PUB" ]; then
            echo "Failed to derive Ed25519 pubkey"; exit 1;
          fi
          echo "Derived Ed25519 public key: ${PUB}"
          echo "ED25519_PUBLIC_KEY_B64=$PUB" >> "$GITHUB_ENV"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ED25519_SEED_B64: ${{ secrets.ED25519_SEED_B64 }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}

  # ─── Phase 2: Build MSI (needs goreleaser for the Windows agent binary) ───
  build-msi:
    needs: goreleaser
    runs-on: windows-2025
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          if ($version -notmatch '\.\d+$') {
            $version = $version + ".0"
          }
          $version = $version -replace '-.*', ''
          echo "VERSION=$version" >> $env:GITHUB_ENV
          echo "TAG_VERSION=$tag" >> $env:GITHUB_ENV
          echo "Version: $version"

      - name: Download Windows agent from release
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $asset = "pbs-plus-agent-$tag-windows-amd64.exe"
          $url = "https://github.com/${{ github.repository }}/releases/download/$tag/$asset"

          $maxAttempts = 30
          $attempt = 0
          $downloaded = $false

          while (-not $downloaded -and $attempt -lt $maxAttempts) {
            try {
              Invoke-WebRequest -Uri $url -OutFile "pbs-plus-agent.exe" -Headers @{Authorization="token ${{ secrets.GITHUB_TOKEN }}"}
              $downloaded = $true
              Write-Host "Downloaded successfully"
            } catch {
              $attempt++
              Write-Host "Attempt $attempt failed, waiting 10 seconds..."
              Start-Sleep -Seconds 10
            }
          }

          if (-not $downloaded) {
            throw "Failed to download Windows agent after $maxAttempts attempts"
          }

          if (-not (Test-Path "pbs-plus-agent.exe")) {
            throw "Downloaded file does not exist"
          }

          $size = (Get-Item "pbs-plus-agent.exe").Length
          Write-Host "Downloaded file size: $size bytes"

          if ($size -eq 0) {
            throw "Downloaded file is empty"
          }

      - name: Install WiX Toolset
        run: choco install wixtoolset -y

      - name: Refresh environment
        shell: pwsh
        run: |
          $env:PATH = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
          echo $env:PATH

      - name: Build MSI
        shell: pwsh
        run: |
          $env:VERSION = "${{ env.VERSION }}"
          $env:AGENT_EXE_PATH = "${{ github.workspace }}\pbs-plus-agent.exe"

          if (-not (Test-Path $env:AGENT_EXE_PATH)) {
            throw "Agent executable not found at $env:AGENT_EXE_PATH"
          }

          New-Item -ItemType Directory -Force -Path "${{ github.workspace }}\msi-output" | Out-Null

          $licensePath = "${{ github.workspace }}\build\package\windows_agent\license.rtf"
          Copy-Item "$licensePath" -Destination "${{ github.workspace }}\msi-output\license.rtf"

          $candlePath = "C:\Program Files (x86)\WiX Toolset v3.14\bin\candle.exe"
          if (-not (Test-Path $candlePath)) {
            throw "candle.exe not found at $candlePath"
          }

          & $candlePath `
            -ext WixUtilExtension `
            -out "${{ github.workspace }}\msi-output\Product.wixobj" `
            "${{ github.workspace }}\build\package\windows_agent\Product.wxs"

          if ($LASTEXITCODE -ne 0) {
            throw "candle.exe failed with exit code $LASTEXITCODE"
          }

          $lightPath = "C:\Program Files (x86)\WiX Toolset v3.14\bin\light.exe"
          if (-not (Test-Path $lightPath)) {
            throw "light.exe not found at $lightPath"
          }

          & $lightPath `
            -ext WixUIExtension `
            -ext WixUtilExtension `
            -cultures:en-US `
            -out "${{ github.workspace }}\msi-output\pbs-plus-agent-${{ env.TAG_VERSION }}-windows-amd64.msi" `
            "${{ github.workspace }}\msi-output\Product.wixobj"

          if ($LASTEXITCODE -ne 0) {
            throw "light.exe failed with exit code $LASTEXITCODE"
          }

          $msiPath = "${{ github.workspace }}\msi-output\pbs-plus-agent-${{ env.TAG_VERSION }}-windows-amd64.msi"
          if (-not (Test-Path $msiPath)) {
            throw "MSI file was not created at $msiPath"
          }

          $msiSize = (Get-Item $msiPath).Length
          Write-Host "MSI file size: $msiSize bytes"

      - name: Compute MSI checksum
        shell: pwsh
        run: |
          $msiName = "pbs-plus-agent-${{ env.TAG_VERSION }}-windows-amd64.msi"
          $msiPath = "${{ github.workspace }}\msi-output\$msiName"
          $hash = (Get-FileHash $msiPath -Algorithm SHA256).Hash.ToLower()
          "$hash" | Out-File -Encoding ascii -NoNewline "$msiPath.sha256"
          Write-Host "MSI sha256: $hash"

      - name: Upload MSI to release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ./msi-output/pbs-plus-agent-${{ env.TAG_VERSION }}-windows-amd64.msi
            ./msi-output/pbs-plus-agent-${{ env.TAG_VERSION }}-windows-amd64.msi.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Phase 3: Build server with embedded checksums (needs all artifacts) ───
  # This job downloads all proxied artifacts from the release, computes their
  # sha256 hashes, embeds them into the server binary, then builds + publishes.
  build-server:
    needs: [goreleaser, build-msi]
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.26"

      - name: Generate embedded checksums
        run: |
          TAG="${{ github.ref_name }}"
          GITHUB_REPOSITORY="${{ github.repository }}" \
            ./build/scripts/generate-embedded-checksums.sh "$TAG"
          echo "=== checksums.txt (first 20 lines) ==="
          head -20 internal/server/web/api/agentbin/checksums.txt
          ENTRIES=$(grep -c '=' internal/server/web/api/agentbin/checksums.txt || true)
          echo "Total checksum entries: $ENTRIES"

      - name: Build server binary
        run: |
          TAG="${{ github.ref_name }}"
          mkdir -p dist-bins
          CGO_ENABLED=1 GOEXPERIMENT=greenteagc GOFIPS140=latest \
            go build \
            -ldflags "-X 'main.Version=$TAG'" \
            -o dist-bins/pbs-plus \
            ./cmd/pbs_plus
          echo "Server binary size: $(stat -c%s dist-bins/pbs-plus) bytes"

      - name: Download bkf2pxar from release
        run: |
          TAG="${{ github.ref_name }}"
          mkdir -p dist-bins
          curl -sfL -o dist-bins/bkf2pxar \
            "https://github.com/${{ github.repository }}/releases/download/$TAG/pbs-plus-bkf2pxar-$TAG-linux-amd64"
          chmod +x dist-bins/bkf2pxar
          echo "bkf2pxar size: $(stat -c%s dist-bins/bkf2pxar) bytes"

      - name: Install nfpm
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest

      - name: Build deb package
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          VERSION="$VERSION" nfpm pkg \
            --packager deb \
            --target "pbs-plus-${TAG}-amd64.deb" \
            --config build/package/server/nfpm.yaml
          echo "Deb size: $(stat -c%s pbs-plus-${TAG}-amd64.deb) bytes"

      - name: Prepare release artifacts
        run: |
          TAG="${{ github.ref_name }}"
          mkdir -p server-output
          cp dist-bins/pbs-plus "server-output/pbs-plus-${TAG}-linux-amd64"
          cp "pbs-plus-${TAG}-amd64.deb" "server-output/"
          cd server-output
          sha256sum "pbs-plus-${TAG}-linux-amd64" | awk '{print $1}' > "pbs-plus-${TAG}-linux-amd64.sha256"
          sha256sum "pbs-plus-${TAG}-amd64.deb" | awk '{print $1}' > "pbs-plus-${TAG}-amd64.deb.sha256"

      - name: Upload server artifacts to release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ./server-output/pbs-plus-${{ github.ref_name }}-linux-amd64
            ./server-output/pbs-plus-${{ github.ref_name }}-linux-amd64.sha256
            ./server-output/pbs-plus-${{ github.ref_name }}-amd64.deb
            ./server-output/pbs-plus-${{ github.ref_name }}-amd64.deb.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Blacksmith Builder
        uses: useblacksmith/setup-docker-builder@v1

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}-agent
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-rc') }}

      - name: Build and push
        uses: useblacksmith/build-push-action@v2
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}

  docker-operator:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Blacksmith Builder
        uses: useblacksmith/setup-docker-builder@v1

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}-operator
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-rc') }}

      - name: Build and push operator
        uses: useblacksmith/build-push-action@v2
        with:
          context: .
          file: ./Dockerfile.operator
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
