version: 2

project_name: pbs-plus

git:
  ignore_tags:
    - "*-rc*"

before:
  hooks:
    - go mod tidy
    - ./build/scripts/build-agent-binaries.sh v{{.Version}}

builds:
  # Server build (Linux)
  - id: server
    main: ./cmd/pbs_plus
    binary: pbs-plus
    env:
      - GOEXPERIMENT=greenteagc
      - GOFIPS140=latest
    goos:
      - linux
    goarch:
      - amd64
    ldflags:
      - -X 'main.Version=v{{.Version}}'

  # Linux Agent
  - id: linux-agent
    main: ./cmd/agent
    binary: pbs-plus-agent
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0
      - GOEXPERIMENT=greenteagc
      - GOFIPS140=latest
    ldflags:
      - -X 'main.Version=v{{.Version}}'
      - -X 'github.com/pbs-plus/pbs-plus/internal/agent/updater.Ed25519PublicKeyB64={{ .Env.ED25519_PUBLIC_KEY_B64 }}'
      - -X 'github.com/pbs-plus/pbs-plus/internal/agent/updater.ECDSAPublicKeyB64={{ .Env.ECDSA_PUBLIC_KEY_B64 }}'
      - -extld gcc
      - -extldflags "-static"
    flags:
      - -tags=agent,netgo,osusergo
      - -installsuffix=netgo

  # pxar-mount (replaces Rust pxar-direct-mount)
  - id: pxar-mount
    main: ./cmd/pxar-mount
    binary: pxar-mount
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0
      - GOEXPERIMENT=greenteagc
      - GOFIPS140=latest
    ldflags:
      - -X 'main.Version=v{{.Version}}'
    flags:
      - -installsuffix=netgo

  - id: bkf2pxar
    main: ./cmd/bkf2pxar
    binary: bkf2pxar
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0
      - GOEXPERIMENT=greenteagc
      - GOFIPS140=latest
    ldflags:
      - -s -w -X 'main.Version=v{{.Version}}'
    flags:
      - -installsuffix=netgo

  # BSD Agent
  - id: freebsd-agent
    main: ./cmd/agent
    binary: pbs-plus-agent
    env:
      - GOEXPERIMENT=greenteagc
      - GOFIPS140=latest
    goos:
      - freebsd
    goarch:
      - amd64
      - arm64
    flags:
      - -tags=agent
    ldflags:
      - -X 'main.Version=v{{.Version}}'
      - -X 'github.com/pbs-plus/pbs-plus/internal/agent/updater.Ed25519PublicKeyB64={{ .Env.ED25519_PUBLIC_KEY_B64 }}'
      - -X 'github.com/pbs-plus/pbs-plus/internal/agent/updater.ECDSAPublicKeyB64={{ .Env.ECDSA_PUBLIC_KEY_B64 }}'

  - id: windows-agent
    main: ./cmd/agent
    binary: pbs-plus-agent
    env:
      - GOEXPERIMENT=greenteagc
      - GOFIPS140=latest
    goos:
      - windows
    goarch:
      - amd64
    flags:
      - -tags=agent
    ldflags:
      - -H=windowsgui
      - -X 'main.Version=v{{.Version}}'
      - -X 'github.com/pbs-plus/pbs-plus/internal/agent/updater.Ed25519PublicKeyB64={{ .Env.ED25519_PUBLIC_KEY_B64 }}'
      - -X 'github.com/pbs-plus/pbs-plus/internal/agent/updater.ECDSAPublicKeyB64={{ .Env.ECDSA_PUBLIC_KEY_B64 }}'

  - id: operator
    main: ./cmd/operator
    binary: pbs-plus-operator
    env:
      - CGO_ENABLED=0
      - GOEXPERIMENT=greenteagc
      - GOFIPS140=latest
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X 'main.Version=v{{.Version}}'

binary_signs:
  - id: ecdsa
    cmd: cosign
    args:
      - sign-blob
      - "--key=/tmp/cosign.key"
      - "--output-signature=${signature}"
      - "${artifact}"
      - "--yes"
    signature: "{{ .ProjectName }}-agent-v{{ .Version }}-{{ .Os }}-{{ .Arch }}.ecdsa-sig"
    ids:
      - linux-agent
      - freebsd-agent
      - windows-agent
    artifacts: binary
  - id: ed25519
    cmd: /tmp/bin/signer
    args:
      - ed25519-sign
      - "${artifact}"
      - "${signature}"
    signature: "{{ .ProjectName }}-agent-v{{ .Version }}-{{ .Os }}-{{ .Arch }}.sig"
    ids:
      - linux-agent
      - freebsd-agent
      - windows-agent
    artifacts: binary

archives:
  - id: server
    ids:
      - server
    name_template: "{{ .ProjectName }}-v{{ .Version }}-{{ .Os }}-{{ .Arch }}"
    formats:
      - binary

  - id: linux-agent
    ids:
      - linux-agent
    name_template: "{{ .ProjectName }}-agent-v{{ .Version }}-{{ .Os }}-{{ .Arch }}"
    formats:
      - binary

  - id: freebsd-agent
    ids:
      - freebsd-agent
    name_template: "{{ .ProjectName }}-agent-v{{ .Version }}-{{ .Os }}-{{ .Arch }}"
    formats:
      - binary

  - id: windows-agent
    ids:
      - windows-agent
    name_template: "{{ .ProjectName }}-agent-v{{ .Version }}-{{ .Os }}-{{ .Arch }}"
    formats:
      - binary

  - id: operator
    ids:
      - operator
    name_template: "{{ .ProjectName }}-operator-v{{ .Version }}-{{ .Os }}-{{ .Arch }}"
    formats:
      - binary

  - id: pxar-mount
    ids:
      - pxar-mount
    name_template: "{{ .ProjectName }}-pxar-mount-v{{ .Version }}-{{ .Os }}-{{ .Arch }}"
    formats:
      - binary

  - id: bkf2pxar
    ids:
      - bkf2pxar
    name_template: "{{ .ProjectName }}-bkf2pxar-v{{ .Version }}-{{ .Os }}-{{ .Arch }}"
    formats:
      - binary

checksum:
  name_template: "{{ .ArtifactName }}.{{ .Algorithm }}"
  algorithm: sha256
  split: true

nfpms:
  - id: server-deb
    ids:
      - server
      - bkf2pxar
    package_name: "{{ .ProjectName }}"
    vendor: Son Roy Almerol
    homepage: "https://github.com/{{ .Env.GITHUB_REPOSITORY }}"
    maintainer: Son Roy Almerol <github@snry.me>
    description: >
      PBS Plus is a project focused on extending Proxmox Backup Server (PBS) 
      with advanced features to create a more competitive backup solution
    license: MIT
    formats:
      - deb
    dependencies:
      - proxmox-backup-server (>= 3.2)
      - proxmox-backup-client (>= 3.2.5)
      - fuse3
      - memcached
    contents:
      - src: ./build/package/server/pbs-plus.service
        dst: /lib/systemd/system/pbs-plus.service
        type: config
    scripts:
      postinstall: ./build/package/server/postinst
    overrides:
      deb:
        file_name_template: "{{ .PackageName }}-v{{ .Version }}-{{ .Arch }}"

  - id: linux-agent-deb
    ids:
      - linux-agent
    package_name: "{{ .ProjectName }}-agent"
    vendor: Son Roy Almerol
    homepage: "https://github.com/{{ .Env.GITHUB_REPOSITORY }}"
    maintainer: Son Roy Almerol <github@snry.me>
    description: >
      PBS Plus Agent - Linux agent for PBS Plus backup solution
    license: MIT
    formats:
      - deb
    bindir: /opt/pbs-plus-agent
    contents:
      - src: /opt/pbs-plus-agent/pbs-plus-agent
        dst: /usr/bin/pbs-plus-agent
        type: symlink
      - src: ./build/package/linux_agent/apparmor
        dst: /usr/share/pbs-plus-agent/apparmor/opt.pbs-plus-agent.pbs-plus-agent
        type: config
    scripts:
      postinstall: ./build/package/linux_agent/postinst
    overrides:
      deb:
        file_name_template: "{{ .PackageName }}-v{{ .Version }}-{{ .Arch }}"
    deb:
      scripts:
        templates: ./build/package/linux_agent/templates

  - id: linux-agent-rpm
    ids:
      - linux-agent
    package_name: "{{ .ProjectName }}-agent"
    vendor: Son Roy Almerol
    homepage: "https://github.com/{{ .Env.GITHUB_REPOSITORY }}"
    maintainer: Son Roy Almerol <github@snry.me>
    description: >
      PBS Plus Agent - Linux agent for PBS Plus backup solution
    license: MIT
    formats:
      - rpm
    bindir: /opt/pbs-plus-agent
    contents:
      - src: /opt/pbs-plus-agent/pbs-plus-agent
        dst: /usr/bin/pbs-plus-agent
        type: symlink
      - src: ./build/package/linux_agent/apparmor
        dst: /usr/share/pbs-plus-agent/apparmor/opt.pbs-plus-agent.pbs-plus-agent
        type: config
    scripts:
      postinstall: ./build/package/linux_agent/postinst
    overrides:
      rpm:
        file_name_template: "{{ .PackageName }}-v{{ .Version }}-{{ .Arch }}"

  - id: linux-agent-apk
    ids:
      - linux-agent
    package_name: "{{ .ProjectName }}-agent"
    vendor: Son Roy Almerol
    homepage: "https://github.com/{{ .Env.GITHUB_REPOSITORY }}"
    maintainer: Son Roy Almerol <github@snry.me>
    description: >
      PBS Plus Agent - Linux agent for PBS Plus backup solution
    license: MIT
    formats:
      - apk
    bindir: /opt/pbs-plus-agent
    contents:
      - src: /opt/pbs-plus-agent/pbs-plus-agent
        dst: /usr/bin/pbs-plus-agent
        type: symlink
      - src: ./build/package/linux_agent/apparmor
        dst: /usr/share/pbs-plus-agent/apparmor/opt.pbs-plus-agent.pbs-plus-agent
        type: config
    scripts:
      postinstall: ./build/package/linux_agent/postinst
    overrides:
      apk:
        file_name_template: "{{ .PackageName }}-v{{ .Version }}-{{ .Arch }}"

  - id: pxar-mount-deb
    ids:
      - pxar-mount
    package_name: "{{ .ProjectName }}-pxar-mount"
    vendor: Son Roy Almerol
    homepage: "https://github.com/{{ .Env.GITHUB_REPOSITORY }}"
    maintainer: Son Roy Almerol <github@snry.me>
    description: >
      PBS Plus pxar-mount - FUSE mounter for pxar/mpxar backup archives.
      Replaces the legacy Rust pxar-direct-mount and pxar-socket-api.
    license: MIT
    formats:
      - deb
    dependencies:
      - fuse3
    replaces:
      - pxar-direct-mount
      - pxar-socket-api
    conflicts:
      - pxar-direct-mount
      - pxar-socket-api
    overrides:
      deb:
        file_name_template: "{{ .PackageName }}-v{{ .Version }}-{{ .Arch }}"
        scripts:
          preinstall: "build/package/pxar-mount/preinstall.sh"

  - id: pxar-mount-rpm
    ids:
      - pxar-mount
    package_name: "{{ .ProjectName }}-pxar-mount"
    vendor: Son Roy Almerol
    homepage: "https://github.com/{{ .Env.GITHUB_REPOSITORY }}"
    maintainer: Son Roy Almerol <github@snry.me>
    description: >
      PBS Plus pxar-mount - FUSE mounter for pxar/mpxar backup archives.
      Replaces the legacy Rust pxar-direct-mount and pxar-socket-api.
    license: MIT
    formats:
      - rpm
    dependencies:
      - fuse3
    replaces:
      - pxar-direct-mount
      - pxar-socket-api
    conflicts:
      - pxar-direct-mount
      - pxar-socket-api
    overrides:
      rpm:
        file_name_template: "{{ .PackageName }}-v{{ .Version }}-{{ .Arch }}"
        scripts:
          preinstall: "build/package/pxar-mount/preinstall.sh"

release:
  github:
    owner: "{{ .Env.GITHUB_REPOSITORY_OWNER }}"
    name: "{{ .Env.GITHUB_REPOSITORY_NAME }}"
  name_template: "PBS Plus {{ .Version }}"
  draft: false
  prerelease: auto
  replace_existing_artifacts: true
  mode: replace

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
