apiVersion: v1
kind: Namespace
metadata:
  name: pbs-plus-operator
  labels:
    app.kubernetes.io/name: pbs-plus-operator
    app.kubernetes.io/component: operator
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pbs-plus-operator
  namespace: pbs-plus-operator
  labels:
    app.kubernetes.io/name: pbs-plus-operator
    app.kubernetes.io/component: operator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: pbs-plus-operator
  labels:
    app.kubernetes.io/name: pbs-plus-operator
    app.kubernetes.io/component: operator
rules:
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources: ["volumesnapshots"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources: ["volumesnapshotclasses"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: pbs-plus-operator
  labels:
    app.kubernetes.io/name: pbs-plus-operator
    app.kubernetes.io/component: operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: pbs-plus-operator
subjects:
  - kind: ServiceAccount
    name: pbs-plus-operator
    namespace: pbs-plus-operator
---
apiVersion: v1
kind: Secret
metadata:
  name: pbs-plus-bootstrap
  namespace: pbs-plus-operator
  labels:
    app.kubernetes.io/name: pbs-plus-operator
    app.kubernetes.io/component: operator
stringData:
  server-url: "https://pbs-server.example.com:8008"
  bootstrap-token: "your-bootstrap-token-here"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pbs-plus-operator
  namespace: pbs-plus-operator
  labels:
    app.kubernetes.io/name: pbs-plus-operator
    app.kubernetes.io/component: operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pbs-plus-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pbs-plus-operator
    spec:
      serviceAccountName: pbs-plus-operator
      containers:
        - name: operator
          image: ghcr.io/pbs-plus/pbs-plus-operator:latest
          imagePullPolicy: IfNotPresent
          args:
            - "--server-url=$(PBS_PLUS_SERVER_URL)"
            - "--bootstrap-token-secret=pbs-plus-bootstrap"
            - "--agent-image=ghcr.io/pbs-plus/pbs-plus-agent:latest"
          env:
            - name: PBS_PLUS_SERVER_URL
              valueFrom:
                secretKeyRef:
                  name: pbs-plus-bootstrap
                  key: server-url
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
      restartPolicy: Always